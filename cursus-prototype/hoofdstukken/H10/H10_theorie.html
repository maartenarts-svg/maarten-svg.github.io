<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoofdstuk 10 — Rekenen met letters</title>
  <link rel="stylesheet" href="../../css/cursus.css">

  <style>
    /* ============================================================
       LAYOUT-SYSTEEM
       Schakel hier tussen systeem 1 (doorlopend) en systeem 2 (pagina's)
       door de klasse op <body> aan te passen in het JS hieronder.
       Zie ook: LAYOUT_SYSTEEM variabele in het <script> blok onderaan.
       ============================================================ */

    /* ---- SYSTEEM 1: doorlopend document ---- */
    body.systeem-1 .cursus-wrapper {
      max-width: 21cm;
      margin: 1cm auto;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      padding: var(--marge-top) var(--marge-rechts) var(--marge-bottom) var(--marge-links);
      box-sizing: border-box;
    }
    body.systeem-1 .pagina-scheiding { display: none; }
    body.systeem-1 .pagina-blok { display: block; position: relative; }
    body.systeem-1 .paginanummer { display: none; }
    body.systeem-1 .hoofdstuk-titel-header { display: none; }

    /* ---- SYSTEEM 2: pagina's met marges ---- */
    body.systeem-2 {
      background: #f0f0f0;
    }
    body.systeem-2 .cursus-wrapper {
      max-width: none;
      margin: 0;
      background: none;
      padding: 0;
      box-shadow: none;
    }
    body.systeem-2 .pagina-blok {
      width: 21cm;
      min-height: 29.7cm;
      margin: 1cm auto;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      box-sizing: border-box;
      padding: var(--marge-top) var(--marge-rechts) var(--marge-bottom) var(--marge-links);
      position: relative;
      overflow: hidden;
    }
    body.systeem-2 .pagina-scheiding {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 21cm;
      margin: 0.3cm auto;
      color: #999;
      font-size: 9pt;
      gap: 0.4cm;
      user-select: none;
    }
    body.systeem-2 .pagina-scheiding::before,
    body.systeem-2 .pagina-scheiding::after {
      content: '';
      flex: 1;
      border-top: 1px dashed #bbb;
    }

    /* Paginanummer: absoluut in bovenmarge */
    .paginanummer {
      position: absolute;
      top: 1cm; /* ~1cm van rand, zit al in marge-top */
      font-size: var(--fontsize);
      font-family: var(--font);
      color: var(--tekst);
    }
    .paginanummer.links  { left:  calc(var(--marge-links) - 1.7cm); }
    .paginanummer.rechts { right: var(--marge-rechts); }

    /* Hoofdstuktitel in header (alle pagina's behalve eerste) */
    .hoofdstuk-titel-header {
      position: absolute;
      top: 1cm;
      font-size: var(--fontsize);
      font-family: var(--font);
      color: var(--tekst);
    }
    /* Even pagina: titel links (naast paginanummer rechts) */
    .hoofdstuk-titel-header.links  { right:  var(--marge-rechts); }
    /* Oneven pagina: titel rechts (naast paginanummer links) */
    .hoofdstuk-titel-header.rechts { left: calc(var(--marge-links) - 1.7cm); }

    /* ============================================================
       ZWEVEND NAVIGATIEPANEEL (alleen systeem 2, niet afdrukken)
       ============================================================ */
    #nav-paneel {
      display: none;
      position: fixed;
      bottom: 1cm;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 1.5px solid var(--groen-donker);
      border-radius: 6px;
      padding: 0.3cm 0.5cm;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 0.3cm;
      font-family: var(--font);
      font-size: var(--fontsize);
      z-index: 1000;
    }
    body.systeem-2 #nav-paneel { display: flex; }

    #nav-paneel input {
      width: 1.5cm;
      text-align: center;
      border: 1.5px solid var(--groen-rand) !important;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: var(--fontsize);
      font-family: var(--font);
      outline: none;  /* ← verwijder de blauwe browserkader bij focus */
    }

    #nav-paneel button {
      background: var(--groen-donker);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 3px 10px;
      font-size: var(--fontsize);
      font-family: var(--font);
      cursor: pointer;
    }
    #nav-paneel button:hover { background: var(--groen-midden); }

    @media print {
      #nav-paneel { display: none !important; }
    }

    /* ============================================================
       OPMAKEN TITELS
       ============================================================ */

    /* 1) Opmaak titel (hoofdstuktitel) */
    .opmaak-titel {
      font-size: 40pt;
      font-weight: bold;
      text-align: right;
      font-family: var(--font);
      color: var(--groen-donker);
      margin: 0;
      padding: 0;
      line-height: 1.1;
    }

    /* 2) Opmaak bannerachtig */
    .banner {
      display: flex;
      align-items: stretch;
      margin: 0.3cm 0;
      /* Balk loopt van 1.5cm linkerrand tot 2.5cm rechterrand
         Compenseer voor de linkermarge (--marge-links = 3cm):
         balk begint op: -marge-links + 1.5cm = -1.5cm relatief aan content */
      position: relative;
      left: calc(-1 * var(--marge-links) + 1.2cm);
      /* Breedte: pagina - 1.2cm links - 2.5cm rechts = 21cm - 3.7cm = 17.3cm */
      width: calc(21cm - 3.7cm);
    }
    .banner-icoon {
      background-color: var(--groen-pastel);
      display: flex;
      align-items: center;
      justify-content: center;
      /* Breedte van het icoongedeelte = marge-links - 1.5cm = 3cm - 1.5cm = 1.5cm */
      width: calc(var(--marge-links) - 1.5cm);
      flex-shrink: 0;
      font-size: 1.1em;
      padding: 0.2cm 0;
    }
    .banner-tekst {
      background-color: var(--groen-pastel);
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0.15cm 0.3cm;
      font-size: 20pt;
      font-weight: bold;
      color: var(--groen-donker);
      font-family: var(--font);
    }

    /* 3) Opmaak paragraaf */
    .opmaak-paragraaf {
      display: flex;
      align-items: baseline;
      margin: 0.3cm 0 0.1cm 0;
      position: relative;
    }
    .paragraaf-nummer {
      position: absolute;
      /* Nummer staat op 1.5cm van linkerrand → t.o.v. content = -marge-links + 1.5cm */
      left: calc(-1 * var(--marge-links) + 1.2cm);
      font-size: 20pt;
      font-weight: bold;
      color: var(--groen-donker);
      font-family: var(--font);
      white-space: nowrap;
    }
    .paragraaf-titel {
      font-size: 20pt;
      font-weight: bold;
      color: var(--groen-donker);
      font-family: var(--font);
    }

    /* 3b) Opmaak subparagraaf */
    .opmaak-subparagraaf {
      display: flex;
      align-items: baseline;
      margin: 0.3cm 0 0.1cm 0;
      position: relative;
    }
    .subparagraaf-nummer {
      position: absolute;
      /* Nummer staat op 1.5cm van linkerrand → t.o.v. content = -marge-links + 1.5cm */
      left: calc(-1 * var(--marge-links) + 1.2cm);
      font-size: 14pt;
      font-weight: bold;
      color: var(--groen-donker);
      font-family: var(--font);
      white-space: nowrap;
    }
    .subparagraaf-titel {
      font-size: 14pt;
      font-weight: bold;
      color: var(--groen-donker);
      font-family: var(--font);
    }

    /* 4) Opmaak onderdeel */
    .opmaak-onderdeel {
      display: flex;
      align-items: center;
      margin: 0.25cm 0 0.1cm 0;
      position: relative;
    }
    .onderdeel-icoon {
      position: absolute;
      /* Icoon gecentreerd tussen 1.2cm van linkerrand en linkermarge */
      left: calc(-1 * var(--marge-links) + 1.2cm);
      width: calc(var(--marge-links) - 1.2cm);
      text-align: center;
      font-size: 1em;
    }
    .onderdeel-titel {
      font-size: 14pt;
      font-weight: bold;
      color: var(--groen-donker);
      text-decoration: underline;
      font-family: var(--font);
    }

    /* ============================================================
       INHOUDSTAFEL
       ============================================================ */
    .inhoudstafel-inhoud {
      font-size: var(--fontsize);
      font-family: var(--font);
      line-height: 1.8;
    }
    .inhoudstafel-rij {
      display: flex;
      align-items: baseline;
    }
    .inhoudstafel-rij .it-tekst {
      flex-shrink: 0;
    }
    .inhoudstafel-rij .it-stippen {
      flex: 1;
      border-bottom: 1px dotted var(--tekst);
      margin: 0 0.2cm;
      position: relative;
      top: -0.15em;
    }
    .inhoudstafel-rij .it-blz {
      flex-shrink: 0;
      min-width: 1cm;
      text-align: right;
    }
    /* In systeem 1: geen stippen en paginanummers */
    body.systeem-1 .it-stippen,
    body.systeem-1 .it-blz { display: none; }

    /* ============================================================
       RUIMTE VOOR CONTENT (later te vullen)
       ============================================================ */
    .content-ruimte {
      min-height: 0.5cm;
    }

    /* Scheiding tussen oefeningen (groene lijn) */
    .oefening + .oefening {
      border-top: 2px solid var(--groen-scheiding);
      padding-top: 0.4cm;
      margin-top: 0.2cm;
    }

    /* ============================================================
       AFDRUK
       ============================================================ */
    @media print {
      body { background: white !important; }
      .pagina-scheiding { display: none !important; }
      .pagina-blok {
        margin: 0 !important;
        box-shadow: none !important;
        page-break-after: always;
      }
    }

    /* ============================================================
      REGISTER
      ============================================================ */
    .register-kolommen {
      column-count: 2;
      column-gap: 1cm;
    }
    .register-letter {
      font-size: 14pt;
      font-weight: bold;
      color: var(--groen-donker);
      margin-top: 0.3cm;
      margin-bottom: 0.05cm;
      break-after: avoid;
    }
    .register-rij {
      display: flex;
      align-items: baseline;
      break-inside: avoid;
    }
    .register-rij .reg-tekst  { flex-shrink: 0; }
    .register-rij .reg-stippen {
      flex: 1;
      border-bottom: 1px dotted var(--tekst);
      margin: 0 0.2cm;
      position: relative;
      top: -0.15em;
    }
    .register-rij .reg-blz {
      flex-shrink: 0;
      min-width: 1cm;
      text-align: right;
    }
    body.systeem-1 .reg-stippen,
    body.systeem-1 .reg-blz { display: none; }
  </style>
</head>
<body>

<div class="cursus-wrapper" id="cursus-wrapper">
  <!-- Pagina's worden hier dynamisch gegenereerd door JS -->
</div>

<script src="../../js/helpers.js"></script>
<script>
/* ============================================================
   LAYOUT-SYSTEEM
   ============================================================
   Verander de waarde hieronder om te wisselen tussen:
     1 → doorlopend document (digitaal gebruik)
     2 → pagina's met paginanummers en paginawissels (voor afdruk)
   ============================================================ */
const LAYOUT_SYSTEEM = 2;   // ← HIER AANPASSEN (1 of 2)
// !! Zet op true voor oplossingensleutel, false voor normaal gebruik !!
TOON_OPLOSSINGEN = false;
const TOON_VULLINGSBALK = false; // ← hier aan/uit zetten
TOGGLE_TOEGESTAAN = true;

/* ============================================================
   CONFIGURATIE
   ============================================================ */
const EERSTE_PAGINA    = 79;   // ← beginpaginanummer van dit hoofdstuk
const HOOFDSTUK_TITEL  = '10 Rekenen met letters';

/* ============================================================
   PAGINA-BEHEER
   ============================================================ */
let huidigePaginaNummer = EERSTE_PAGINA;
let huidigePaginaEl     = null;   // het actieve .pagina-blok
let eersteHoofdstukPagina = true;
const wrapper = document.getElementById('cursus-wrapper');

/** Maak een nieuwe pagina aan en voeg die toe aan de wrapper */
function nieuwePagina() {
  // Scheiding invoegen (systeem 2 toont dit, systeem 1 verbergt het via CSS)
  if (huidigePaginaEl !== null) {
    const scheiding = document.createElement('div');
    scheiding.classList.add('pagina-scheiding');
    scheiding.textContent = 'volgende pagina';
    wrapper.appendChild(scheiding);
  }

  const pagina = document.createElement('div');
  pagina.classList.add('pagina-blok');

  // Paginanummer (systeem 2)
  const nr = document.createElement('div');
  nr.classList.add('paginanummer');
  nr.textContent = huidigePaginaNummer;
  if (huidigePaginaNummer % 2 === 0) {
    nr.classList.add('links');
  } else {
    nr.classList.add('rechts');
  }
  pagina.appendChild(nr);

  // Hoofdstuktitel in header (alle pagina's behalve de allereerste)
  if (!eersteHoofdstukPagina) {
    const hdr = document.createElement('div');
    hdr.classList.add('hoofdstuk-titel-header');
    hdr.textContent = HOOFDSTUK_TITEL;
    // Even pagina: titel links; oneven pagina: titel rechts
    if (huidigePaginaNummer % 2 === 0) {
      hdr.classList.add('links');
    } else {
      hdr.classList.add('rechts');
    }
    pagina.appendChild(hdr);
  }

  //voettekst
  const voet = document.createElement('div');
  voet.style.position   = 'absolute';
  voet.style.bottom     = '1.5cm';
  voet.style.left       = 'calc(var(--marge-links) - 1.7cm)';
  voet.style.right      = 'var(--marge-rechts)';
  voet.style.borderTop  = '0.8px solid var(--tekst)';
  voet.style.paddingTop = '0.15cm';
  voet.style.fontSize   = 'var(--fontsize)';
  voet.style.fontFamily = 'var(--font)';
  pagina.appendChild(voet);
  voet.textContent = 'math@LAB: theorie';  // ← HIER AANPASSEN
  voet.style.textAlign = (huidigePaginaNummer) % 2 === 0 ? 'right' : 'left';

  wrapper.appendChild(pagina);
  huidigePaginaEl     = pagina;
  huidigePaginaNummer++;
  eersteHoofdstukPagina = false;
  return pagina;
}

/** Geeft het huidige inhoudselement terug (de actieve pagina) */
function huidigePagina() {
  if (!huidigePaginaEl) nieuwePagina();
  return huidigePaginaEl;
}

/* ============================================================
   HULPFUNCTIES VOOR STRUCTUURELEMENTEN
   ============================================================ */

/**
 * Voeg een banner-element (opmaak 2) toe aan de huidige pagina.
 * @param {string} icoon  - emoji of tekst voor het icoongedeelte
 * @param {string} tekst  - titeltekst van de banner
 */
function voegBannerToe(icoon, tekst) {
  const banner = document.createElement('div');
  banner.classList.add('banner');

  const icoonDiv = document.createElement('div');
  icoonDiv.classList.add('banner-icoon');
  icoonDiv.textContent = icoon;

  const tekstDiv = document.createElement('div');
  tekstDiv.classList.add('banner-tekst');
  tekstDiv.textContent = tekst;

  banner.appendChild(icoonDiv);
  banner.appendChild(tekstDiv);
  huidigePagina().appendChild(banner);
  return banner;
}

/**
 * Voeg een paragraaftitel (opmaak 3) toe aan de huidige pagina.
 * @param {string} nummer - bv. '10.1'
 * @param {string} tekst  - bv. 'Eigenschappen van bewerkingen'
 */
function voegParagraafToe(nummer, tekst) {
  const div = document.createElement('div');
  div.classList.add('opmaak-paragraaf');
  div.id = `paragraaf-${nummer.replace('.', '-')}`;  // ← anker-id

  const nrSpan = document.createElement('span');
  nrSpan.classList.add('paragraaf-nummer');
  nrSpan.textContent = nummer;

  const txtSpan = document.createElement('span');
  txtSpan.classList.add('paragraaf-titel');
  txtSpan.textContent = tekst;

  div.appendChild(nrSpan);
  div.appendChild(txtSpan);
  huidigePagina().appendChild(div);
  return div;
}

var _paragraafNamenGlobaal = {};
const _origVoegParagraafToe = voegParagraafToe;
voegParagraafToe = function(nummer, tekst) {
  _paragraafNamenGlobaal[nummer] = tekst;
  return _origVoegParagraafToe(nummer, tekst);
};

/**
 * Voeg een subparagraaftitel (opmaak 3) toe aan de huidige pagina.
 * @param {string} nummer - bv. '10.1'
 * @param {string} tekst  - bv. 'Eigenschappen van bewerkingen'
 */
function voegSubparagraafToe(nummer, tekst) {
  const div = document.createElement('div');
  div.classList.add('opmaak-subparagraaf');

  const nrSpan = document.createElement('span');
  nrSpan.classList.add('subparagraaf-nummer');
  nrSpan.textContent = nummer;

  const txtSpan = document.createElement('span');
  txtSpan.classList.add('subparagraaf-titel');
  txtSpan.textContent = tekst;

  div.appendChild(nrSpan);
  div.appendChild(txtSpan);
  huidigePagina().appendChild(div);
  return div;
}

/**
 * Voeg een onderdeeltitel (opmaak 4) toe aan de huidige pagina.
 * @param {string} icoon - emoji of tekst
 * @param {string} tekst - bv. 'Ontdekkingstocht'
 */
function voegOnderdeelToe(icoon, tekst) {
  const div = document.createElement('div');
  div.classList.add('opmaak-onderdeel');

  const icoonSpan = document.createElement('span');
  icoonSpan.classList.add('onderdeel-icoon');
  icoonSpan.textContent = icoon;

  const txtSpan = document.createElement('span');
  txtSpan.classList.add('onderdeel-titel');
  txtSpan.textContent = tekst;

  div.appendChild(icoonSpan);
  div.appendChild(txtSpan);
  huidigePagina().appendChild(div);
  return div;
}


/**
 * Voeg een inhoudszone toe (lege ruimte voor later te vullen)
 * @param {string} id - optionele id voor later gebruik
 */
function voegContentToe(id = '') {
  const div = document.createElement('div');
  div.classList.add('content-ruimte');
  if (id) div.id = id;
  huidigePagina().appendChild(div);
  return div;
}

/**
 * Maak ruimte boven een oefening.
 * Kan overal aangeroepen worden.
 */
const bovenTitel = '0.5cm';
const onderTitel = '0.3cm'

function witregel(hoogte = '0.3cm') {
  const div = document.createElement('div');
  div.style.height = hoogte;
  huidigePagina().appendChild(div);
}

/**
 * Manuele paginawissel tussen oefeningen (gebruik dit om op een specifieke plek
 * een nieuwe pagina te forceren, ongeacht het systeem)
 * ← Je kunt dit overal in de structuur aanroepen
 */
function forceerPaginawissel() {
  if (LAYOUT_SYSTEEM === 1) {
    // In systeem 1: voeg een groene lijn toe in plaats van een paginawissel
    const lijn = document.createElement('div');
    lijn.style.borderTop = '2px solid var(--groen-scheiding)';
    lijn.style.marginTop = '0.2cm';
    lijn.style.paddingTop = '0.4cm';
    huidigePagina().appendChild(lijn);
  } else {
    nieuwePagina();
  }
}

/* ============================================================
   INHOUDSTAFEL — paginanummers
   De nummers hieronder worden automatisch berekend op basis
   van de volgorde van nieuwePagina()-aanroepen.
   Als je de structuur aanpast, worden deze automatisch bijgewerkt.

   De variabele wordt gevuld terwijl de structuur opgebouwd wordt.
   ============================================================ */
const inhoudstafelData = [];  // { tekst, blz } — wordt gevuld hieronder

/* ============================================================
   TREFWOORDEN
   ============================================================ */
const trefwoordenData = [];  // { trefwoord, blz } — wordt gevuld bij laadTheorieOnderdeel

const _origLaadTheorieOnderdeel = laadTheorieOnderdeel;
laadTheorieOnderdeel = function(selector, onderdelen) {
  const blz = huidigePaginaNummer - 1;
  onderdelen.forEach(o => {
    if (o.trefwoorden) {
      o.trefwoorden.forEach(tw => {
        trefwoordenData.push({ trefwoord: tw, blz: blz });
      });
    }
  });
  return _origLaadTheorieOnderdeel(selector, onderdelen);
};

/* ============================================================
   OPBOUW VAN DE THEORIE
   ============================================================

   De structuur hieronder bouwt het volledige hoofdstuk op.
   [nieuwe pagina] → nieuwePagina() aanroep
   Gebruik forceerPaginawissel() op andere plaatsen waar je
   zelf een paginawissel wilt invoegen.
   ============================================================ */

/* BEGIN VANAF HIER MET TELLEN */

// ── PAGINA 1: Hoofdstuktitel + Inhoudstafel ──────────────────
nieuwePagina(); 
witregel('12.21cm');
const titelDiv = document.createElement('div');
titelDiv.classList.add('opmaak-titel');
titelDiv.textContent = HOOFDSTUK_TITEL;
huidigePagina().appendChild(titelDiv);

witregel('5cm');
const blzInhoudstafel = huidigePaginaNummer - 1;

// De inhoudstafel wordt na de structuuropbouw ingevuld (zie onderaan)
const inhoudstafelContainer = document.createElement('div');
inhoudstafelContainer.classList.add('inhoudstafel-inhoud');
inhoudstafelContainer.id = 'inhoudstafel-container';
huidigePagina().appendChild(inhoudstafelContainer);

// ── PAGINA 2: Start ──────────────────────────────────────────

// ── PARAGRAAF 10.1 ───────────────────────────────────────────
nieuwePagina();   // pagina 458
inhoudstafelData.push({ tekst: '10.1 Eigenschappen van bewerkingen', blz: huidigePaginaNummer - 1, soort: 'par'});
voegParagraafToe('10.1', 'Eigenschappen van bewerkingen');

voegContentToe('content-101-theorie');
laadTheorieOnderdeel('#content-101-theorie', [
  { 
    bestand: 'theorie/th_101_optelling.js',
    trefwoorden: ['commutativiteit', 'associativiteit','neutraal element','symmetrisch element'] 
  },
  { 
    bestand: 'theorie/th_101_optellingEnVermenigvuldiging.js',
    trefwoorden: ['distributiviteit']
  },
]);

forceerPaginawissel();
voegContentToe('content-101-theorie-2');
laadTheorieOnderdeel('#content-101-theorie-2', [
  { 
    bestand: 'theorie/th_101_vermenigvuldiging.js',
    trefwoorden: ['commutativiteit', 'associativiteit','neutraal element','opslorpend element','symmetrisch element'] 
  },
]);

(function vulRegister() {
  const container = document.createElement('div');
  container.classList.add('register-kolommen');

  // Dedupliceer en sorteer
  const uniek = {};
  trefwoordenData.forEach(({ trefwoord, blz }) => {
    const key = trefwoord.toLowerCase();
    if (!uniek[key]) uniek[key] = { trefwoord, blzLijst: [] };
    if (!uniek[key].blzLijst.includes(blz)) uniek[key].blzLijst.push(blz);
  });
  const gesorteerd = Object.values(uniek).sort((a, b) =>
    a.trefwoord.localeCompare(b.trefwoord, 'nl')
  );

  // Groepeer per beginletter
  const perLetter = {};
  gesorteerd.forEach(item => {
    const letter = item.trefwoord[0].toUpperCase();
    if (!perLetter[letter]) perLetter[letter] = [];
    perLetter[letter].push(item);
  });

  Object.keys(perLetter).sort().forEach(letter => {
    const letterDiv = document.createElement('div');
    letterDiv.classList.add('register-letter');
    letterDiv.textContent = letter;
    container.appendChild(letterDiv);

    perLetter[letter].forEach(item => {
      const rij = document.createElement('div');
      rij.classList.add('register-rij');

      const tekst = document.createElement('span');
      tekst.classList.add('reg-tekst');
      tekst.textContent = item.trefwoord;

      const stippen = document.createElement('span');
      stippen.classList.add('reg-stippen');

      const blzSpan = document.createElement('span');
      blzSpan.classList.add('reg-blz');
      blzSpan.textContent = item.blzLijst.join(', ');

      rij.appendChild(tekst);
      rij.appendChild(stippen);
      rij.appendChild(blzSpan);
      container.appendChild(rij);
    });
  });

  huidigePagina().appendChild(container);
})();

(function vulInhoudstafel() {
  const container = document.getElementById('inhoudstafel-container');
  if (!container) return;

  const items = [
    { tekst: '10.1 Eigenschappen van bewerkingen', blz: null },
    { tekst: '10.2 Lettervormen',                  blz: null },
    { tekst: '10.2.1 Begrippen',                  blz: null, soort: 'subpar' },
    { tekst: '10.2.2 Getalwaarde van een lettervorm',   blz: null, soort: 'subpar' },
    { tekst: '10.3 Lettervormen herleiden',         blz: null },
    { tekst: '10.3.1 Een som herleiden',   blz: null, soort: 'subpar' },
    { tekst: '10.3.2 Een product herleiden',   blz: null, soort: 'subpar' },
    { tekst: '10.4 Een getal vermenigvuldigen met een lettervorm', blz: null },
    { type: 'witregel' },
    { tekst: 'Register', blz: null },
  ];

  // Koppel paginanummers vanuit inhoudstafelData
  inhoudstafelData.forEach(({ tekst, blz }) => {
    const item = items.find(i => i.tekst === tekst);
    if (item) item.blz = blz;
  });

  items.forEach(item => {
    if (item.type === 'witregel') {
      const br = document.createElement('div');
      br.style.height = '0.5em';
      container.appendChild(br);
      return;
    }

    const rij = document.createElement('div');
    rij.classList.add('inhoudstafel-rij');
    if (item.stijl === 'bold') rij.style.fontWeight = 'bold';

    const tekst = document.createElement('span');
    if (item.soort === 'subpar') {
      tekst.style.paddingLeft = '1cm';
    }
    tekst.classList.add('it-tekst');
    tekst.textContent = item.tekst;
    rij.appendChild(tekst);

    // Stippen (alleen systeem 2)
    const stippen = document.createElement('span');
    stippen.classList.add('it-stippen');
    rij.appendChild(stippen);

    // Paginanummer (alleen systeem 2)
    const blzSpan = document.createElement('span');
    blzSpan.classList.add('it-blz');
    blzSpan.textContent = item.blz !== null ? item.blz : '??';
    rij.appendChild(blzSpan);

    container.appendChild(rij);
  });
})();

/* ============================================================
   VULLINGSINDICATOR
   Berekent per pagina hoeveel ruimte gebruikt is en toont
   dat als een gekleurde balk rechts van de pagina.
   Groen = ok, oranje = bijna vol (>80%), rood = te vol (>100%)
   ============================================================ */
function updateVulling() {
  if (!TOON_VULLINGSBALK) return;
  const BESCHIKBARE_HOOGTE = 24.7 * 39.191;
  document.querySelectorAll('.pagina-blok').forEach(pagina => {
    // Maak balk aan als die er nog niet is
    let balk = pagina.querySelector('.vullings-balk');
    if (!balk) {
      balk = document.createElement('div');
      balk.classList.add('vullings-balk');
      const vulling = document.createElement('div');
      vulling.classList.add('vullings-balk-vulling');
      balk.appendChild(vulling);
      pagina.appendChild(balk);
    }
    const vullingDiv = balk.querySelector('.vullings-balk-vulling');
    let gebruiktPx = 0;
    pagina.childNodes.forEach(kind => {
      if (kind.nodeType === 1 && !kind.classList.contains('vullings-balk'))
        gebruiktPx += kind.offsetHeight;
    });
    const procent = Math.min((gebruiktPx / BESCHIKBARE_HOOGTE) * 100, 110);
    vullingDiv.style.height = procent + '%';
    if (procent > 100) {
      vullingDiv.style.background = '#e53935';
    } else if (procent > 80) {
      vullingDiv.style.background = '#fb8c00';
    } else {
      vullingDiv.style.background = 'var(--groen-midden)';
    }
  });
}

window.addEventListener('load', () => setTimeout(updateVulling, 2000));

/* ============================================================
   NAVIGATIE NAAR BLADZIJDE
   ============================================================ */
function navigeerNaarBlz() {
  const nr = parseInt(document.getElementById('nav-input').value);
  if (isNaN(nr)) return;
  const paginas = document.querySelectorAll('.pagina-blok');
  for (const pagina of paginas) {
    const nrEl = pagina.querySelector('.paginanummer');
    if (nrEl && parseInt(nrEl.textContent) === nr) {
      pagina.scrollIntoView({ behavior: 'smooth' });
      return;
    }
  }
}

// Ook werken met Enter-toets
window.addEventListener('load', () => {
  const navInput = document.getElementById('nav-input');
  navInput.style.cssText += '; border: 1.5px solid #4a7c59 !important;';
  navInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') navigeerNaarBlz();
  });
});

/* ============================================================
   HUIDIGE PAGINA BIJHOUDEN
   ============================================================ */
let huidigePaginaIndex = 0;

function updateHuidigeBlz() {
  const paginas = document.querySelectorAll('.pagina-blok');
  if (!paginas.length) return;
  const nrEl = paginas[huidigePaginaIndex].querySelector('.paginanummer');
  if (nrEl) document.getElementById('nav-huidig').textContent = nrEl.textContent;
}

function navigeerRelatief(richting) {
  const paginas = document.querySelectorAll('.pagina-blok');
  const nieuw = huidigePaginaIndex + richting;
  if (nieuw < 0 || nieuw >= paginas.length) return;
  huidigePaginaIndex = nieuw;
  paginas[huidigePaginaIndex].scrollIntoView({ behavior: 'smooth' });
  updateHuidigeBlz();
}

window.addEventListener('load', () => {
  // IntersectionObserver om huidige pagina bij te houden
  const observer = new IntersectionObserver(entries => {
    let maxRatio = 0;
    entries.forEach(entry => {
      if (entry.intersectionRatio > maxRatio) {
        maxRatio = entry.intersectionRatio;
        const paginas = [...document.querySelectorAll('.pagina-blok')];
        const idx = paginas.indexOf(entry.target);
        if (idx !== -1) huidigePaginaIndex = idx;
        updateHuidigeBlz();
      }
    });
  }, { threshold: [0.1, 0.3, 0.5, 0.7, 0.9] });

  document.querySelectorAll('.pagina-blok').forEach(p => observer.observe(p));
  updateHuidigeBlz();

  // Bestaande Enter-toets
  const navInput = document.getElementById('nav-input');
  navInput.style.setProperty('border', '1.5px solid #4a7c59', 'important');
  navInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') navigeerNaarBlz();
  });
});

</script>

  <button id="nav-vorige" onclick="navigeerRelatief(-1)">←</button>

  <button id="nav-volgende" onclick="navigeerRelatief(1)">→</button>
  <div style="width:1px;background:var(--groen-rand);height:1.2em;margin:0 0.2cm;"></div>
