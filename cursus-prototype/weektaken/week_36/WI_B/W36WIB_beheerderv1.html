<!DOCTYPE html>
<!-- ============================================================
  W36WIB_beheerderv1.html  —  Beheerderspagina voor digitale weektaak
============================================================ -->
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beheerder — WI B</title>
  <link rel="stylesheet" href="../../css/taak.css">
  <style>
    body { background: #f0f4f0; font-size: 13px; }
    .beheer-pagina { min-height: 100vh; }
    .topbalk {
      background: var(--groen-donker); color: white;
      padding: 0.6rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .topbalk-titel { font-size: 1rem; font-weight: 700; }
    .topbalk-knop {
      padding: 0.35rem 0.8rem;
      background: rgba(255,255,255,0.15); color: white;
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: var(--radius); font-size: 0.85rem;
      font-family: var(--font); cursor: pointer;
    }
    .topbalk-knop:hover { background: rgba(255,255,255,0.28); }
    .leerling-sim {
      background: #fffde7; border-bottom: 1.5px solid #f9a825;
      padding: 0.6rem 1.5rem;
      display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap;
    }
    .sim-label { font-size: 0.85rem; font-weight: 600; color: #5d4037; }
  </style>
</head>
<body class="beheer-pagina">

  <header class="topbalk">
    <span class="topbalk-titel" id="topbalk-titel">Beheerder — WI B</span>
    <div style="display:flex; gap:0.6rem;">
      <button class="topbalk-knop" id="knop-als-leerling">Leerlingenscherm</button>
      <button class="topbalk-knop" id="knop-uitloggen">Uitloggen</button>
    </div>
  </header>

  <div class="leerling-sim verborgen" id="sim-balk">
    <span class="sim-label">Leerling:</span>
    <select id="sim-leerling" class="veld-invoer" style="max-width:280px; font-size:0.85rem;">
      <option value="">— Kies leerling —</option>
    </select>
    <button class="knop-primair" id="knop-sim-bekijk" style="font-size:0.85rem; padding:0.4rem 0.9rem;">
      Bekijk
    </button>
    <button class="knop-secundair" id="knop-terug-beheer" style="font-size:0.85rem; padding:0.4rem 0.9rem;">
      ← Terug
    </button>
  </div>

  <div id="sim-container" class="verborgen"
       style="background:white; min-height:calc(100vh - 120px);">
  </div>

  <div id="beheer-scherm">
    <nav class="tabs-balk">
      <button class="tab-knop actief" data-tab="leerlingen">Leerlingenbeheer</button>
      <button class="tab-knop"        data-tab="scores">Scores</button>
    </nav>

    <div class="tab-inhoud">

      <!-- ── Tab: Leerlingenbeheer ── -->
      <div class="tab-paneel actief" id="tab-leerlingen">
        <div style="display:flex; gap:0.7rem; flex-wrap:wrap; margin-bottom:1rem; align-items:center;">
          <input type="text" id="zoek-ll" class="veld-invoer"
            placeholder="Zoek op naam of mail…" style="max-width:280px; font-size:0.85rem;">
          <button class="knop-primair"   id="knop-nieuwe-ll"
            style="font-size:0.85rem;">+ Leerling toevoegen</button>
          <button class="knop-secundair" id="knop-upload-ll"
            style="font-size:0.85rem;">CSV uploaden</button>
          <button class="knop-secundair" id="knop-download-ll"
            style="font-size:0.85rem;">Voorbeeld CSV</button>
          <input type="file" id="csv-ll" accept=".csv" style="display:none;">
        </div>
        <div id="ll-tabel"></div>
        <div id="ll-formulier" class="verborgen"></div>
      </div>

      <!-- ── Tab: Scores ── -->
      <div class="tab-paneel" id="tab-scores">
        <div class="formulier-kaart" style="max-width:500px;">
          <h3 style="color:var(--groen-donker); margin-bottom:0.8rem;">Scores downloaden</h3>
          <p style="font-size:0.85rem; color:var(--tekst-zacht); margin-bottom:1rem;">
            Download een CSV met de scores van alle leerlingen,
            berekend via het scoreberekening-script.
          </p>
          <button class="knop-primair" id="knop-scores-download">CSV downloaden</button>
          <p class="sectie-leeg" id="scores-info" style="margin-top:0.5rem;"></p>
        </div>
        <div class="formulier-kaart" style="max-width:700px; margin-top:1rem;">
          <h3 style="color:var(--groen-donker); margin-bottom:0.8rem;">Scores aanpassen</h3>
          <div style="display:flex; gap:0.7rem; margin-bottom:0.8rem; align-items:center;">
            <select id="score-leerling" class="veld-invoer" style="max-width:280px; font-size:0.85rem;">
              <option value="">— Kies leerling —</option>
            </select>
            <button class="knop-secundair" id="knop-score-laden" style="font-size:0.85rem;">Laden</button>
          </div>
          <div id="score-aanpas-wrap"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="../../js/helpers.js"></script>
  <script type="module">
    import { fetchAlleLeerlingen, saveLeerling, fetchBeheerder,
            deleteDoc } from '../../js/firebase.js';

    // ── Configuratie ──────────────────────────────────────────
    const TAAK_ID   = 'W36WIB';
    const TAAK_CODE = 'WI B';

    // ── Init ──────────────────────────────────────────────────
    document.getElementById('topbalk-titel').textContent = `Beheerder — ${TAAK_CODE}`;

    const _mail = localStorage.getItem('taak_mail');
    if (!_mail) {
      window.location.href = window.location.pathname
        .replace('_beheerderv1.html', '_taakv1.html');
    }

    const beheerder = await fetchBeheerder(_mail);
    if (!beheerder) {
      window.location.href = window.location.pathname
        .replace('_beheerderv1.html', '_taakv1.html');
    }

    let _leerlingen = {};
    try {
      _leerlingen = await fetchAlleLeerlingen(TAAK_ID) || {};
    } catch (e) {
      console.error('Kan leerlingen niet laden:', e);
    }

    // ── Tabs ──────────────────────────────────────────────────
    document.querySelectorAll('.tab-knop').forEach(knop => {
      knop.addEventListener('click', () => {
        document.querySelectorAll('.tab-knop').forEach(k => k.classList.remove('actief'));
        document.querySelectorAll('.tab-paneel').forEach(p => p.classList.remove('actief'));
        knop.classList.add('actief');
        document.getElementById('tab-' + knop.dataset.tab).classList.add('actief');
      });
    });

    // ── Uitloggen ─────────────────────────────────────────────
    document.getElementById('knop-uitloggen').addEventListener('click', () => {
      localStorage.removeItem('taak_mail');
      window.location.href = window.location.pathname
        .replace('_beheerderv1.html', '_taakv1.html');
    });

    // ================================================================
    //  LEERLINGENSCHERM SIMULATIE
    // ================================================================
    const simBalk      = document.getElementById('sim-balk');
    const simContainer = document.getElementById('sim-container');
    const beheerScherm = document.getElementById('beheer-scherm');

    document.getElementById('knop-als-leerling').addEventListener('click', () => {
      simBalk.classList.remove('verborgen');
      _vulSimDropdown();
    });

    document.getElementById('knop-terug-beheer').addEventListener('click', () => {
      simBalk.classList.add('verborgen');
      simContainer.classList.add('verborgen');
      simContainer.innerHTML = '';
      beheerScherm.classList.remove('verborgen');
    });

    document.getElementById('knop-sim-bekijk').addEventListener('click', () => {
      const mail = document.getElementById('sim-leerling').value;
      if (!mail) { alert('Kies eerst een leerling.'); return; }
      const safemail = mail.toLowerCase().replace(/[^a-z0-9]/g, '_');
      if (!_leerlingen[safemail]) { alert('Leerling niet gevonden.'); return; }
      beheerScherm.classList.add('verborgen');
      simContainer.classList.remove('verborgen');
      simContainer.innerHTML = `
        <iframe
          src="${window.location.pathname.replace('_beheerderv1.html', '_taakv1.html')}?sim=${encodeURIComponent(mail)}"
          style="width:100%; height:calc(100vh - 120px); border:none;">
        </iframe>`;
    });

    function _vulSimDropdown() {
      const sel = document.getElementById('sim-leerling');
      sel.innerHTML = '<option value="">— Kies leerling —</option>';
      Object.values(_leerlingen)
        .sort((a, b) => (a.volledigeNaam || '').localeCompare(b.volledigeNaam || ''))
        .forEach(l => {
          const opt = document.createElement('option');
          opt.value = l.mail;
          opt.textContent = l.volledigeNaam || l.mail;
          sel.appendChild(opt);
        });
    }

    // ================================================================
    //  TAB: LEERLINGENBEHEER
    // ================================================================
    document.getElementById('zoek-ll').addEventListener('input', _renderLeerlingenTabel);
    document.getElementById('knop-nieuwe-ll').addEventListener('click', () => _toonLeerlingForm(null));
    document.getElementById('knop-upload-ll').addEventListener('click', () =>
      document.getElementById('csv-ll').click());
    document.getElementById('csv-ll').addEventListener('change', _verwerkCsv);
    document.getElementById('knop-download-ll').addEventListener('click', () =>
      _downloadCsv(
        'mail,volledigeNaam,voornaam,familienaam\n' +
        'jan.janssen@school.be,Jan Janssen,Jan,Janssen\n',
        'voorbeeld_leerlingen.csv'
      )
    );

    _renderLeerlingenTabel();

    function _leerlingenAlsArray() {
      return Object.values(_leerlingen);
    }

    function _renderLeerlingenTabel() {
      const zoek = (document.getElementById('zoek-ll')?.value || '').toLowerCase();
      const wrap = document.getElementById('ll-tabel');
      if (!wrap) return;

      const items = _leerlingenAlsArray().filter(l =>
        !zoek ||
        l.volledigeNaam?.toLowerCase().includes(zoek) ||
        l.mail?.toLowerCase().includes(zoek)
      );

      if (items.length === 0) {
        wrap.innerHTML = '<p class="sectie-leeg">Geen leerlingen gevonden.</p>';
        return;
      }

      items.sort((a, b) => (a.volledigeNaam || '').localeCompare(b.volledigeNaam || ''));

      wrap.innerHTML = `
        <table class="beheer-tabel">
          <thead><tr>
            <th>Mail</th><th>Naam</th><th>Voornaam</th><th>Familienaam</th>
            <th>Ingediend</th><th></th>
          </tr></thead>
          <tbody>
            ${items.map(l => `
              <tr>
                <td>${l.mail}</td>
                <td>${l.volledigeNaam || ''}</td>
                <td>${l.voornaam || ''}</td>
                <td>${l.familienaam || ''}</td>
                <td>${l.ingediend ? '✓' : '—'}</td>
                <td><button class="knop-secundair"
                  style="padding:0.2rem 0.6rem; font-size:0.8rem;"
                  data-mail="${l.mail}">Bewerk</button></td>
              </tr>`).join('')}
          </tbody>
        </table>`;

      wrap.querySelectorAll('button[data-mail]').forEach(knop => {
        knop.addEventListener('click', () => {
          const safemail = knop.dataset.mail.toLowerCase().replace(/[^a-z0-9]/g, '_');
          _toonLeerlingForm(_leerlingen[safemail]);
        });
      });
    }

    function _toonLeerlingForm(leerling) {
      const wrap    = document.getElementById('ll-formulier');
      const isNieuw = leerling === null;
      const l       = leerling || {};

      wrap.classList.remove('verborgen');
      wrap.innerHTML = `
        <div class="formulier-kaart">
          <h3 style="color:var(--groen-donker); margin-bottom:0.8rem;">
            ${isNieuw ? 'Nieuwe leerling' : 'Bewerk: ' + (l.volledigeNaam || '')}
          </h3>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.6rem;">
            <div class="veld-groep">
              <label class="veld-label">Mailadres</label>
              <input type="text" id="ll-mail" class="veld-invoer"
                value="${_esc(l.mail || '')}"
                ${!isNieuw ? 'readonly style="background:#f0f0f0;"' : ''}>
            </div>
            <div class="veld-groep">
              <label class="veld-label">Voornaam</label>
              <input type="text" id="ll-voornaam" class="veld-invoer"
                value="${_esc(l.voornaam || '')}">
            </div>
            <div class="veld-groep">
              <label class="veld-label">Familienaam</label>
              <input type="text" id="ll-familienaam" class="veld-invoer"
                value="${_esc(l.familienaam || '')}">
            </div>
          </div>
          <div style="display:flex; gap:0.7rem; margin-top:1rem;">
            <button class="knop-primair"   id="ll-opslaan">Opslaan</button>
            <button class="knop-secundair" id="ll-annuleer">Annuleer</button>
            ${!isNieuw ? `<button class="knop-secundair" id="ll-verwijder"
              style="margin-left:auto;color:#c62828;border-color:#c62828;">
              Verwijder</button>` : ''}
          </div>
        </div>`;

      wrap.querySelector('#ll-annuleer').addEventListener('click', () => {
        wrap.classList.add('verborgen');
        wrap.innerHTML = '';
      });

      wrap.querySelector('#ll-opslaan').addEventListener('click', async () => {
        const vn  = wrap.querySelector('#ll-voornaam').value.trim();
        const fn  = wrap.querySelector('#ll-familienaam').value.trim();
        const mail = isNieuw
          ? wrap.querySelector('#ll-mail').value.trim().toLowerCase()
          : l.mail;

        if (!mail) { alert('Mailadres verplicht.'); return; }

        const safemail = mail.toLowerCase().replace(/[^a-z0-9]/g, '_');
        const bestaand = _leerlingen[safemail] || {};

        const nieuw = {
          ...bestaand,
          mail,
          voornaam:      vn,
          familienaam:   fn,
          volledigeNaam: `${vn} ${fn}`.trim(),
          antwoorden:    bestaand.antwoorden    ?? {},
          succescriteria: bestaand.succescriteria ?? [],
          ingediend:     bestaand.ingediend     ?? false,
          scores:        bestaand.scores        ?? {},
        };

        await saveLeerling(TAAK_ID, mail, nieuw);
        _leerlingen[safemail] = nieuw;

        wrap.classList.add('verborgen');
        wrap.innerHTML = '';
        _renderLeerlingenTabel();
        _vulScoreDropdown();
      });

      if (!isNieuw) {
        wrap.querySelector('#ll-verwijder').addEventListener('click', async () => {
          if (!confirm(`Verwijder ${l.volledigeNaam}?`)) return;
          const safemail = l.mail.toLowerCase().replace(/[^a-z0-9]/g, '_');
          await deleteDoc(TAAK_ID, safemail);
          delete _leerlingen[safemail];
          wrap.classList.add('verborgen');
          wrap.innerHTML = '';
          _renderLeerlingenTabel();
          _vulScoreDropdown();
        });
      }
    }

    async function _verwerkCsv(e) {
      const bestand = e.target.files[0];
      if (!bestand) return;
      const lezer = new FileReader();
      lezer.onload = async (ev) => {
        const regels  = ev.target.result.split('\n').filter(r => r.trim());
        const headers = regels[0].split(',').map(h => h.trim());
        let toegevoegd = 0;
        for (let i = 1; i < regels.length; i++) {
          const w   = regels[i].split(',').map(v => v.trim());
          const rij = {};
          headers.forEach((h, j) => rij[h] = w[j] || '');
          if (!rij.mail) continue;
          rij.volledigeNaam = `${rij.voornaam || ''} ${rij.familienaam || ''}`.trim();
          const safemail = rij.mail.toLowerCase().replace(/[^a-z0-9]/g, '_');
          const bestaand = _leerlingen[safemail];
          const nieuw = {
            ...(bestaand || {}),
            ...rij,
            antwoorden:    bestaand?.antwoorden    ?? {},
            succescriteria: bestaand?.succescriteria ?? [],
            ingediend:     bestaand?.ingediend     ?? false,
            scores:        bestaand?.scores        ?? {},
          };
          await saveLeerling(TAAK_ID, rij.mail, nieuw);
          if (!bestaand) toegevoegd++;
          _leerlingen[safemail] = nieuw;
        }
        _renderLeerlingenTabel();
        _vulScoreDropdown();
        alert(`CSV verwerkt. ${toegevoegd} nieuwe leerlingen.`);
      };
      lezer.readAsText(bestand);
      e.target.value = '';
    }

    // ================================================================
    //  TAB: SCORES
    // ================================================================
    _vulScoreDropdown();

    function _vulScoreDropdown() {
      const sel = document.getElementById('score-leerling');
      if (!sel) return;
      sel.innerHTML = '<option value="">— Kies leerling —</option>';
      _leerlingenAlsArray()
        .sort((a, b) => (a.volledigeNaam || '').localeCompare(b.volledigeNaam || ''))
        .forEach(l => {
          const opt = document.createElement('option');
          opt.value = l.mail;
          opt.textContent = l.volledigeNaam || l.mail;
          sel.appendChild(opt);
        });
    }

    document.getElementById('knop-score-laden').addEventListener('click', () => {
      const mail = document.getElementById('score-leerling').value;
      if (!mail) { alert('Kies eerst een leerling.'); return; }
      const safemail = mail.toLowerCase().replace(/[^a-z0-9]/g, '_');
      const leerling = _leerlingen[safemail];
      if (!leerling) return;
      _toonScoreAanpassing(leerling);
    });

    function _toonScoreAanpassing(leerling) {
      const wrap   = document.getElementById('score-aanpas-wrap');
      const scores = leerling.scores || {};

      wrap.innerHTML = `
        <p style="font-size:0.85rem; margin-bottom:0.5rem;">
          <strong>${leerling.volledigeNaam}</strong>
        </p>
        <div id="score-velden" style="display:flex; flex-direction:column; gap:0.4rem;"></div>
        <button class="knop-primair" id="knop-score-opslaan"
          style="margin-top:0.8rem; font-size:0.85rem;">
          Scores opslaan
        </button>`;

      const velden = wrap.querySelector('#score-velden');
      Object.entries(scores).forEach(([sleutel, waarde]) => {
        const rij = document.createElement('div');
        rij.style.cssText = 'display:flex; align-items:center; gap:0.5rem; font-size:0.85rem;';
        rij.innerHTML = `
          <span style="min-width:120px;">${sleutel}</span>
          <input type="text" class="score-invoer" data-sleutel="${sleutel}"
            value="${_esc(String(waarde))}">`;
        velden.appendChild(rij);
      });

      if (Object.keys(scores).length === 0) {
        velden.innerHTML = '<p class="sectie-leeg">Nog geen scores beschikbaar.</p>';
      }

      wrap.querySelector('#knop-score-opslaan')?.addEventListener('click', async () => {
        wrap.querySelectorAll('.score-invoer').forEach(inp => {
          leerling.scores[inp.dataset.sleutel] = inp.value.trim();
        });
        const safemail = leerling.mail.toLowerCase().replace(/[^a-z0-9]/g, '_');
        await saveLeerling(TAAK_ID, leerling.mail, leerling);
        _leerlingen[safemail] = leerling;
        alert('Scores opgeslagen.');
      });
    }

    document.getElementById('knop-scores-download').addEventListener('click', async () => {
      const info = document.getElementById('scores-info');
      info.textContent = '';

      const scorePad = 'data/score.js';
      await new Promise((ok, fout) => {
        const s = document.createElement('script');
        s.src = scorePad; s.onload = ok; s.onerror = fout;
        document.head.appendChild(s);
      }).catch(() => {
        info.textContent = `Kon ${scorePad} niet laden.`;
        return;
      });

      if (typeof window.__berekenScores !== 'function') {
        info.textContent = 'score.js exporteert geen __berekenScores()-functie.';
        return;
      }

      const leerlingen = _leerlingenAlsArray();
      const regels = ['mail;volledigeNaam;voornaam;familienaam'];
      const extraKolommen = [];

      leerlingen.forEach((l, idx) => {
        const scores = window.__berekenScores(l);
        if (idx === 0) extraKolommen.push(...Object.keys(scores));
        const waarden = Object.values(scores).map(v => `"${String(v).replace(/"/g, "'")}" `);
        regels.push([l.mail, l.volledigeNaam, l.voornaam, l.familienaam, ...waarden].join(';'));
      });

      if (extraKolommen.length > 0) {
        regels[0] += ';' + extraKolommen.join(';');
      }

      _downloadCsv(regels.join('\n'), `scores_${TAAK_ID}.csv`);
    });

    // ── Hulpfuncties ──────────────────────────────────────────
    function _esc(str) {
      return String(str || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function _downloadCsv(inhoud, naam) {
      const blob = new Blob([inhoud], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = naam; a.click();
      URL.revokeObjectURL(url);
    }

  </script>
</body>
</html>
